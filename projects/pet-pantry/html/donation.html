<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Pet Pantry Sign Up</title>
  <link rel="stylesheet" href="../css/reset.css" type="text/css">
  <link rel="stylesheet" href="../css/layout.css" type="text/css">
  <link rel="stylesheet" href="../css/styles.css" type="text/css">
</head>

<body>

  <header>
    <img src="../img/Pet Pantry Logo.svg" alt="Pet Pantry Logo">
    <nav>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li class="on"><a href="">Donation </a></li>
        <li><a href="../html/volunteer.html" target="_blank">Get Involved</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <h1>Example Donation Sign-Up</h1>

    <form action="#" method="post">
      <!--------CONTACT INFO---------->
      <fieldset>
        <legend>Contact Information</legend>

        <label for="fname">First Name</label>
        <input type="text" name="fname" id="fname">

        <label for="lname">Last Name</label>
        <input type="text" name="lname" id="lname">

        <label for="phone">Phone Number</label>
        <input type="number" name="phone" id="phone">

        <label for="email">E-Mail</label>
        <input type="email" name="email" id="email">
      </fieldset>

      <!-------------FOOD-------------->
      <fieldset>
        <legend>Food Donations</legend>

        <label for="dinfo">What Would You Like to Donate?</label>
        <input type="text" name="dinfo" id="dinfo">

        <label for="freq">Once or monthly?</label>
        <input type="text" name="frequency" id="freq">
      </fieldset>

      <!------------SUPPLY------------>
      <fieldset>
        <legend>Supply Donations</legend>

        <label for="supply">What Do You Have to Donate?</label>
        <input type="text" name="supply" id="supply">
      </fieldset>

      <!-------------MONEY-------------->
      <fieldset>
        <legend>Financial Donations</legend>

        <label for="amount">How Much Would You Like to Donate?</label>
        <input type="text" name="amount" id="amount">

        <label for="freq">Once or monthly?</label>
        <input type="text" name="frequency" id="freq">
      </fieldset>

      <!-------------Notes-------------->
      <fieldset>
        <legend>Notes</legend>

        <label for="ass">Do you need assistance with pick-up or delivery?</label>
        <input type="text" name="ass" id="ass">

        <label for="notes">Is there anything else we should know?</label>
        <input type="text" name="notes" id="notes">
      </fieldset>

      <!-----------BUTTONS------------>
      <input type="submit" value="Send">
      <input type="reset" value="Cancel">

    </form>
  </main>

  <footer>
    <p>
      &copy; 2026 Pet Pantry. All rights reserved.
    </p>
  </footer>
  </footer>

</body>

</html>
