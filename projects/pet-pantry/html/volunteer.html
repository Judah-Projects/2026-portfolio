<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Pet Pantry Sign Up</title>
    <link rel="stylesheet" href="../css/reset.css" type="text/css">
    <link rel="stylesheet" href="../css/layout.css" type="text/css">
    <link rel="stylesheet" href="../css/styles.css" type="text/css">

      <script defer src="../javascript/forms.js"></script>
  <script defer src="../javascript/volunteer.js"></script>
</head>

<body>

    <header>
        <img src="../img/Pet Pantry Logo.svg" alt="Pet Pantry Logo">
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../html/donation.html" target="_blank">Donation </a></li>
                <li class="on"><a href="">Get Involved</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <h1>Example Volunteer Sign-Up</h1>

        <form action="#" method="post">

            <!----CONTACT INFO--------->
            <fieldset>
                <legend>Contact Information</legend>
                <label for="fname">First Name</label>
                <input type="text" name="fname" id="fname">

                <label for="lname">Last Name</label>
                <input type="text" name="lname" id="lname">

                <label for="phone">Phone Number</label>
                <input type="tel" name="phone" id="phone">

                <label for="email">E-Mail</label>
                <input type="email" name="email" id="email">
            </fieldset>

            <!-------Logistics---------->
            <fieldset>
                <legend>Logistics</legend>

                <label for="town">Address</label>
                <input type="text" name="town" id="town">

                <label for="age">Age</label>
                <input type="text" name="age" id="age">

                <label for="interest">Interests? </label>
                <input type="text" name="interest" id="interest">

                <label for="avail">Availability?</label>
                <input type="date" name="avail" id="avail">

                <label for="fun">Colour of your personality?</label>
                <input type="color" name="color" id="fun">
            </fieldset>
            <p>These answers could help pair you with complimentary tasks, people, or animals.</p>

            <!---------Notes----------->
            <fieldset>
                <legend>Notes</legend>

                <label for="ride">Do you need to be picked up or dropped off?</label>
                <input type="text" name="ride" id="ride">

                <label for="notes">Is there anything else we should know?</label>
                <input type="text" name="notes" id="notes">
            </fieldset>

            <!--------BUTTONS---------->
            <input type="submit">
            <input type="reset" value="Cancel">
        </form>
    </main>

    <footer>
        <p>
            &copy; 2026 Pet Pantry. All rights reserved.
        </p>
    </footer>

</body>

</html>
